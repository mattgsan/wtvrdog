<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black; /* optional */
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* keeps entire image visible */
    }
  </style>
</head>
<body>
  <img src="image.jpg" alt="Image">
</body>
</html>
